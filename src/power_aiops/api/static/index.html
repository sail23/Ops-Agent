<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能运维</title>
    <style>
        :root {
            --bg-deep: #0a0f1e;
            --bg-surface: #111827;
            --bg-card: rgba(20, 32, 58, 0.8);
            --border-glow: rgba(99, 179, 237, 0.15);
            --border-active: rgba(99, 179, 237, 0.5);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-ops: #00d4ff;
            --accent-sre: #ff6b9d;
            --accent-code: #00f5d4;
            --accent-report: #a78bfa;
            --accent-user: #fbbf24;
            --glow-ops: rgba(0, 212, 255, 0.3);
            --glow-sre: rgba(255, 107, 157, 0.3);
            --glow-code: rgba(0, 245, 212, 0.3);
            --glow-report: rgba(167, 139, 250, 0.3);
            --glass-bg: rgba(15, 25, 50, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(30, 45, 80, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 背景网格动画 */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(99, 179, 237, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 179, 237, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-glow::before {
            content: '';
            position: absolute;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
            animation: floatGlow 8s ease-in-out infinite;
        }

        .bg-glow::after {
            content: '';
            position: absolute;
            bottom: -100px;
            right: -100px;
            width: 500px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(167, 139, 250, 0.07) 0%, transparent 70%);
            animation: floatGlow 10s ease-in-out infinite reverse;
        }

        @keyframes floatGlow {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-45%) scale(1.1); }
        }

        /* 顶栏 */
        .header {
            flex-shrink: 0;
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            background: rgba(15, 25, 50, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-ops), var(--accent-report));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 20px var(--glow-ops);
        }

        .header-title {
            font-size: 17px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-ops), var(--accent-report));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .header-subtitle {
            font-size: 10px;
            color: #475569;
            font-family: 'Consolas', 'Fira Code', monospace;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .pipeline-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(15, 25, 50, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 12px;
            color: #64748b;
            font-family: 'Consolas', 'Fira Code', monospace;
        }

        .pipeline-status.pipeline-mode {
            color: #86efac;
            border-color: rgba(134, 239, 172, 0.4);
            background: rgba(134, 239, 172, 0.05);
        }

        .pipeline-status.debate-mode {
            color: #c4b5fd;
            border-color: rgba(196, 181, 253, 0.4);
            background: rgba(196, 181, 253, 0.05);
        }

        .pipeline-status.active {
            color: #67e8f9;
            border-color: rgba(103, 232, 249, 0.4);
            background: rgba(103, 232, 249, 0.05);
        }

        .pipeline-status.done {
            color: #86efac;
            border-color: rgba(134, 239, 172, 0.4);
            background: rgba(134, 239, 172, 0.05);
        }

        .pipeline-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #475569;
        }

        .pipeline-status.active .pipeline-dot {
            background: #67e8f9;
            box-shadow: 0 0 8px #67e8f9;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .pipeline-status.done .pipeline-dot {
            background: #86efac;
            box-shadow: 0 0 8px #86efac;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Agent 状态指示器：外层固定条高，内层 scale(0.25) 为原视觉四分之一 */
        .agent-strip-scale-wrap {
            flex-shrink: 0;
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            background: rgba(10, 15, 30, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .agent-strip {
            flex-shrink: 0;
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 10px 28px;
            transform: scale(0.5);
            transform-origin: top center;
            /* scale 不改变布局高度，用负边距收掉多出来的约 1/2 垂直空间 */
            margin-bottom: calc(-0.5 * (20px + 48px));
        }

        .agent-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Segoe UI', 'PingFang SC', 'Consolas', monospace;
            letter-spacing: 0.02em;
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(30, 41, 59, 0.85);
            transition: all 0.3s ease;
        }

        /* 等待：仍保持可读，仅用略淡文字区分，不再整卡 opacity */
        .agent-badge.waiting {
            color: #cbd5e1;
            border-color: rgba(255, 255, 255, 0.14);
            background: rgba(24, 32, 52, 0.75);
        }

        .agent-badge.active {
            color: #f8fafc;
            border-color: var(--agent-color);
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 0 16px var(--agent-glow), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        .agent-badge.done {
            color: #bbf7d0;
            border-color: rgba(134, 239, 172, 0.55);
            background: rgba(20, 45, 35, 0.65);
        }

        .agent-badge-icon {
            width: 32px;
            height: 32px;
            min-width: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            line-height: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
        }

        .agent-badge.ops   { --agent-color: var(--accent-ops);   --agent-glow: var(--glow-ops); }
        .agent-badge.sre   { --agent-color: var(--accent-sre);   --agent-glow: var(--glow-sre); }
        .agent-badge.code  { --agent-color: var(--accent-code);  --agent-glow: var(--glow-code); }
        .agent-badge.report{ --agent-color: var(--accent-report); --agent-glow: var(--glow-report); }
        .agent-badge.debate{ --agent-color: var(--accent-report); --agent-glow: var(--glow-report); }

        /* 辩论轮次徽章 */
        .debate-round-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 6px;
            background: rgba(196, 181, 253, 0.2);
            border: 1px solid rgba(196, 181, 253, 0.3);
            border-radius: 4px;
            color: #c4b5fd;
            margin-right: 6px;
            font-weight: 500;
        }

        /* 辩论模式当前发言指示器 */
        .debate-turn-indicator {
            position: fixed;
            bottom: 20px;
            right: 28px;
            padding: 10px 18px;
            background: rgba(30, 32, 58, 0.95);
            border: 1px solid rgba(196, 181, 253, 0.4);
            border-radius: 10px;
            font-size: 13px;
            color: #c4b5fd;
            backdrop-filter: blur(12px);
            z-index: 100;
            display: none;
            box-shadow: 0 0 20px rgba(196, 181, 253, 0.15);
        }
        .debate-turn-indicator.visible {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .debate-turn-indicator .agent-emoji {
            font-size: 18px;
        }
        .debate-turn-indicator .agent-name {
            font-weight: 600;
            color: #f1f5f9;
        }
        .debate-turn-indicator .turn-label {
            font-size: 11px;
            color: #94a3b8;
        }

        .agent-badge.ops   .agent-badge-icon {
            background: linear-gradient(145deg, rgba(0, 212, 255, 0.45), rgba(0, 180, 220, 0.25));
            border-color: rgba(0, 212, 255, 0.55);
            filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.5));
        }
        .agent-badge.sre   .agent-badge-icon {
            background: linear-gradient(145deg, rgba(255, 107, 157, 0.45), rgba(220, 80, 130, 0.25));
            border-color: rgba(255, 107, 157, 0.55);
            filter: drop-shadow(0 0 6px rgba(255, 107, 157, 0.45));
        }
        .agent-badge.code  .agent-badge-icon {
            background: linear-gradient(145deg, rgba(0, 245, 212, 0.45), rgba(0, 200, 180, 0.25));
            border-color: rgba(0, 245, 212, 0.55);
            filter: drop-shadow(0 0 6px rgba(0, 245, 212, 0.45));
        }
        .agent-badge.report .agent-badge-icon {
            background: linear-gradient(145deg, rgba(167, 139, 250, 0.5), rgba(130, 100, 220, 0.28));
            border-color: rgba(167, 139, 250, 0.55);
            filter: drop-shadow(0 0 6px rgba(167, 139, 250, 0.45));
        }
        .agent-badge.debate .agent-badge-icon {
            background: linear-gradient(145deg, rgba(167, 139, 250, 0.5), rgba(130, 100, 220, 0.28));
            border-color: rgba(167, 139, 250, 0.55);
            filter: drop-shadow(0 0 6px rgba(167, 139, 250, 0.45));
        }

        .agent-badge.waiting .agent-badge-icon {
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.15));
        }

        .agent-badge.active .agent-badge-icon {
            animation: iconGlow 2s ease-in-out infinite;
        }

        @keyframes iconGlow {
            0%, 100% { box-shadow: 0 0 8px var(--agent-glow); }
            50% { box-shadow: 0 0 18px var(--agent-glow); }
        }

        /* 主内容区：占满 header+strip 以下全部高度，对话区 flex 滚动 */
        .main-content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        /* 消息区域 */
        .messages-container {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 16px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(99, 179, 237, 0.2);
            border-radius: 2px;
        }
        .messages-container::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 179, 237, 0.4);
        }

        /* 消息通用样式 */
        .message-wrapper {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.user {
            flex-direction: row-reverse;
        }

        /* 消息头像 */
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
            position: relative;
        }

        .message-avatar.ops {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 212, 255, 0.05));
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--accent-ops);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.15);
        }
        .message-avatar.sre {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.2), rgba(255, 107, 157, 0.05));
            border: 1px solid rgba(255, 107, 157, 0.3);
            color: var(--accent-sre);
            box-shadow: 0 0 15px rgba(255, 107, 157, 0.15);
        }
        .message-avatar.code {
            background: linear-gradient(135deg, rgba(0, 245, 212, 0.2), rgba(0, 245, 212, 0.05));
            border: 1px solid rgba(0, 245, 212, 0.3);
            color: var(--accent-code);
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.15);
        }
        .message-avatar.report {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.2), rgba(167, 139, 250, 0.05));
            border: 1px solid rgba(167, 139, 250, 0.3);
            color: var(--accent-report);
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.15);
        }
        .message-avatar.user {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(251, 191, 36, 0.05));
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: var(--accent-user);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.15);
        }

        /* 头像光环动画 */
        .message-avatar.active::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 13px;
            background: inherit;
            opacity: 0.3;
            animation: avatarPulse 2s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes avatarPulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.1; }
        }

        /* 消息内容 */
        .message-content {
            max-width: 72%;
            min-width: 100px;
        }

        .message-wrapper.user .message-content {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .message-wrapper.user .message-header {
            flex-direction: row-reverse;
        }

        .message-sender {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            font-family: 'Consolas', monospace;
        }

        .message-wrapper.user .message-sender {
            display: none;
        }

        .interaction-indicator {
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'Consolas', monospace;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13.5px;
            line-height: 1.7;
            word-break: break-word;
            position: relative;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .message-wrapper:not(.user) .message-bubble {
            background: rgba(20, 35, 65, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-top-left-radius: 4px;
            color: #cbd5e1;
        }

        .message-wrapper.user .message-bubble {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.25), rgba(251, 191, 36, 0.1));
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-top-right-radius: 4px;
            color: #e2e8f0;
        }

        /* 打字光标 */
        .message-bubble.streaming::after {
            content: '▋';
            display: inline-block;
            margin-left: 2px;
            animation: blink 0.7s step-end infinite;
            color: var(--accent-ops);
            font-size: 12px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .message-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 5px;
            font-family: 'Consolas', monospace;
        }

        .message-wrapper.user .message-time {
            display: none;
        }

        /* 系统消息 */
        .system-message {
            text-align: center;
            margin: 4px 0;
        }

        .system-message span {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 12px;
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            font-family: 'Consolas', monospace;
        }

        /* 代码块 */
        .message-bubble pre {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #a5d6ff;
            padding: 12px 14px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 12.5px;
            line-height: 1.6;
        }

        .message-bubble code {
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 12.5px;
        }

        .message-bubble pre code {
            background: none;
            padding: 0;
        }

        .inline-code {
            background: rgba(0, 212, 255, 0.1);
            padding: 1px 6px;
            border-radius: 4px;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 12px;
            color: var(--accent-ops);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .message-wrapper.user .inline-code {
            background: rgba(251, 191, 36, 0.1);
            color: var(--accent-user);
            border-color: rgba(251, 191, 36, 0.2);
        }

        /* 标题样式 */
        .message-bubble h3 {
            color: var(--accent-ops);
            font-size: 13px;
            margin: 10px 0 6px;
            font-family: 'Consolas', monospace;
        }

        .message-bubble h2 {
            color: var(--accent-report);
            font-size: 14px;
            margin: 12px 0 8px;
            font-family: 'Consolas', monospace;
        }

        .message-bubble li {
            margin: 4px 0 4px 20px;
            color: #94a3b8;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            gap: 16px;
        }

        .empty-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(167, 139, 250, 0.15));
            border: 1px solid rgba(99, 179, 237, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            animation: emptyPulse 3s ease-in-out infinite;
        }

        @keyframes emptyPulse {
            0%, 100% { box-shadow: 0 0 25px rgba(0, 212, 255, 0.15); }
            50% { box-shadow: 0 0 45px rgba(0, 212, 255, 0.25); }
        }

        .empty-state p {
            font-size: 13px;
            color: #64748b;
            line-height: 1.8;
        }

        /* 底部输入区域（紧凑，避免挤压对话区） */
        .input-area {
            position: relative;
            z-index: 10;
            flex-shrink: 0;
            padding: 8px 20px 12px;
            background: linear-gradient(to top, rgba(10, 15, 30, 0.96) 0%, rgba(15, 20, 40, 0.88) 55%, transparent 100%);
        }

        .input-card {
            background: rgba(20, 32, 58, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 10px 16px 10px;
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.35);
            max-width: 1200px;
            margin: 0 auto;
        }

        .input-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .input-card-header-main {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 12px;
            min-width: 0;
        }

        .input-card-toggle {
            flex-shrink: 0;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .input-card-toggle:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.35);
            color: #67e8f9;
        }

        .input-card-toggle:focus-visible {
            outline: 2px solid rgba(0, 212, 255, 0.5);
            outline-offset: 2px;
        }

        /* 辩论模式切换 */
        .mode-switch-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .mode-switch-wrap label {
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .mode-switch {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }

        .mode-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .mode-slider {
            width: 32px;
            height: 18px;
            background: rgba(60, 80, 120, 0.5);
            border-radius: 9px;
            transition: background 0.2s;
            position: relative;
        }

        .mode-slider::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #94a3b8;
            top: 2px;
            left: 2px;
            transition: transform 0.2s, background 0.2s;
        }

        .mode-switch input:checked + .mode-slider {
            background: rgba(0, 212, 255, 0.3);
        }

        .mode-switch input:checked + .mode-slider::after {
            transform: translateX(14px);
            background: var(--accent-ops);
        }

        .mode-label-active {
            color: var(--accent-ops);
        }

        .mode-label-inactive {
            color: var(--text-muted);
        }

        .input-card-toggle-icon {
            transition: transform 0.22s ease;
        }

        .input-card--collapsed .input-card-toggle-icon {
            transform: rotate(180deg);
        }

        .input-card--collapsed .input-card-header {
            margin-bottom: 0;
            padding-bottom: 4px;
            border-bottom: none;
        }

        .input-card--collapsed .input-footer {
            padding-top: 4px;
            margin-top: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-card--collapsed .input-card-body {
            display: none;
        }

        .input-card-title {
            font-size: 13px;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: 0.02em;
        }

        .input-card-hint {
            font-size: 11px;
            color: #64748b;
        }

        /* 可选字段折叠，默认收起省高度 */
        .input-details-compact {
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 2px 10px 6px;
            background: rgba(0, 0, 0, 0.15);
        }

        .input-details-compact[open] {
            padding-bottom: 8px;
        }

        .input-details-summary {
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            list-style: none;
            user-select: none;
            padding: 4px 0;
        }

        .input-details-summary::-webkit-details-marker {
            display: none;
        }

        .input-details-summary::before {
            content: '▸ ';
            display: inline-block;
            color: #475569;
            transition: transform 0.15s ease;
        }

        .input-details-compact[open] .input-details-summary::before {
            transform: rotate(90deg);
        }

        .input-details-compact .input-grid {
            margin-bottom: 0;
            margin-top: 6px;
        }

        /* 对齐网格：列与列上下对齐 */
        .input-grid {
            display: grid;
            gap: 8px 12px;
            margin-bottom: 8px;
        }

        .input-grid-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .input-grid-3 {
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(100px, 160px);
        }

        .field-wrap {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }

        .field-label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.02em;
        }

        .field-label .optional {
            font-weight: 400;
            color: #64748b;
            font-size: 10px;
        }

        .field-wrap-summary {
            margin-bottom: 6px;
        }

        .input-field {
            width: 100%;
            padding: 7px 11px;
            background: rgba(30, 45, 80, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 8px;
            font-size: 13px;
            color: #e2e8f0;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            font-family: 'Consolas', 'Fira Code', monospace;
        }

        .input-field:focus {
            outline: none;
            border-color: rgba(0, 212, 255, 0.55);
            background: rgba(25, 50, 85, 0.85);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.12), 0 0 18px rgba(0, 212, 255, 0.08);
        }

        .input-field::placeholder {
            color: #64748b;
        }

        textarea.input-field {
            resize: vertical;
            min-height: 44px;
            max-height: 96px;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            font-size: 13px;
            line-height: 1.5;
            color: #e2e8f0;
        }

        .input-footer {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px 14px;
            padding-top: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 0;
        }

        .footer-quick {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: min(100%, 320px);
        }

        @media (min-width: 640px) {
            .footer-quick {
                flex-direction: row;
                align-items: center;
                flex-wrap: wrap;
            }
        }

        .quick-inputs-label {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            padding-top: 2px;
        }

        .quick-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 8px;
            align-items: center;
        }

        .quick-input {
            padding: 4px 10px;
            background: rgba(30, 45, 80, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            font-size: 11px;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            white-space: nowrap;
        }

        .quick-input:hover {
            background: rgba(0, 212, 255, 0.12);
            border-color: rgba(0, 212, 255, 0.35);
            color: #67e8f9;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.12);
        }

        @media (max-width: 720px) {
            .input-grid-2,
            .input-grid-3 {
                grid-template-columns: 1fr;
            }

            .input-footer {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-primary {
                width: 100%;
                justify-content: center;
            }
        }

        /* 主按钮 */
        .btn-primary {
            flex-shrink: 0;
            padding: 8px 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(167, 139, 250, 0.15));
            border: 1px solid rgba(0, 212, 255, 0.4);
            border-radius: 10px;
            color: var(--accent-ops);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(167, 139, 250, 0.2));
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-primary:hover:not(:disabled)::before {
            opacity: 1;
        }

        .btn-primary:hover:not(:disabled) {
            border-color: rgba(0, 212, 255, 0.6);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.2), 0 0 50px rgba(0, 212, 255, 0.05);
            transform: translateY(-1px);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 停止按钮样式 */
        .btn-stop {
            flex-shrink: 0;
            padding: 8px 20px;
            background: linear-gradient(135deg, rgba(255, 82, 82, 0.15), rgba(255, 133, 102, 0.15));
            border: 1px solid rgba(255, 82, 82, 0.4);
            border-radius: 10px;
            color: #ff5252;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-stop::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 82, 82, 0.2), rgba(255, 133, 102, 0.2));
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-stop:hover:not(:disabled)::before {
            opacity: 1;
        }

        .btn-stop:hover:not(:disabled) {
            border-color: rgba(255, 82, 82, 0.6);
            box-shadow: 0 0 25px rgba(255, 82, 82, 0.2), 0 0 50px rgba(255, 82, 82, 0.05);
            transform: translateY(-1px);
        }

        .btn-stop:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .btn-stop:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-primary .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-top-color: var(--accent-ops);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--accent-ops);
            border-radius: 50%;
            animation: typing 1.4s infinite;
            box-shadow: 0 0 5px var(--accent-ops);
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* 连接线动画（Agent 之间的虚线连接） */
        .agent-connector {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 52px;
            gap: 0;
        }

        .connector-line {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(100, 116, 139, 0.4), transparent);
        }

        /* 可视化触发按钮 */
        .viz-trigger {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 16px;
            background: rgba(20, 35, 65, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            margin-top: 12px;
            animation: slideIn 0.3s ease;
        }

        .viz-trigger-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .viz-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(167, 139, 250, 0.2));
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 8px;
            color: var(--accent-ops);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .viz-btn:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(167, 139, 250, 0.3));
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            transform: translateY(-1px);
        }

        /* Pipeline 完成面板（可视化 + 导出） */
        .completion-panel-wrapper {
            text-align: center;
        }
        
        .completion-panel {
            margin: 12px auto;
            animation: slideIn 0.3s ease;
            display: inline-block;
            min-width: 280px;
            max-width: 400px;
        }

        .completion-panel-header {
            padding: 6px 10px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(196, 181, 253, 0.25);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }

        .completion-panel-title {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
        }

        .completion-panel-body {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 10px;
            background: rgba(20, 32, 58, 0.95);
            border: 1px solid rgba(196, 181, 253, 0.25);
            border-top: none;
            border-radius: 0 0 8px 8px;
            backdrop-filter: blur(12px);
        }

        .completion-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #e2e8f0;
            font-size: 11px;
        }

        .completion-btn:hover {
            background: rgba(50, 60, 80, 0.9);
            border-color: rgba(196, 181, 253, 0.4);
            transform: translateY(-1px);
        }

        .completion-btn-icon {
            font-size: 12px;
        }

        .completion-btn-divider {
            width: 1px;
            height: 18px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 2px;
        }

        .completion-btn-small {
            padding: 5px 8px;
        }

        .completion-btn-small .completion-btn-icon {
            font-size: 11px;
        }

        .completion-btn-small .completion-btn-text {
            font-size: 10px;
        }

        /* 辩论报告导出面板 */
        .debate-export-panel {
            margin: 16px auto;
            animation: slideIn 0.3s ease;
            display: block;
            max-width: 400px;
        }
        
        /* 辩论导出包装器 */
        .debate-export-wrapper {
            text-align: center;
        }

        .export-panel-content {
            background: rgba(20, 32, 58, 0.9);
            border: 1px solid rgba(196, 181, 253, 0.3);
            border-radius: 12px;
            padding: 20px 24px;
            max-width: 400px;
            margin: 0 auto;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .export-title {
            font-size: 15px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 6px;
        }

        .export-description {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 16px;
        }

        .export-buttons {
            display: flex;
            gap: 12px;
        }

        .export-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 16px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .export-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .export-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .export-docx:hover:not(:disabled) {
            border-color: rgba(99, 179, 237, 0.5);
            background: rgba(0, 212, 255, 0.1);
        }

        .export-pdf:hover:not(:disabled) {
            border-color: rgba(167, 139, 250, 0.5);
            background: rgba(167, 139, 250, 0.1);
        }

        .export-btn-icon {
            font-size: 24px;
        }

        .export-btn-text {
            font-size: 13px;
            font-weight: 600;
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <!-- 背景层 -->
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <!-- 顶栏 -->
    <div class="header">
        <div class="header-left">
            <div class="header-logo">⚡</div>
            <div>
                <div class="header-title">智能运维</div>
                <div class="header-subtitle">AI-OPS MULTI-AGENT SYSTEM</div>
            </div>
        </div>
        <div class="header-right">
            <div class="mode-switch-wrap" id="mode-switch-wrap" title="切换编排模式：线性 Pipeline 或辩论模式">
                <span id="mode-label-pipeline" class="mode-label-active">Pipeline</span>
                <label class="mode-switch">
                    <input type="checkbox" id="debate-mode-toggle">
                    <span class="mode-slider"></span>
                </label>
                <span id="mode-label-debate" class="mode-label-inactive">辩论</span>
            </div>
            <div class="pipeline-status" id="pipeline-status">
                <div class="pipeline-dot"></div>
                <span id="pipeline-status-text">等待故障输入</span>
            </div>
        </div>
    </div>

    <!-- 辩论模式当前发言指示器 -->
    <div class="debate-turn-indicator" id="debate-turn-indicator">
        <span class="agent-emoji" id="indicator-emoji">⚡</span>
        <span>
            <span class="agent-name" id="indicator-name">Ops-Agent</span>
            <span class="turn-label" id="indicator-label">发言中...</span>
        </span>
    </div>

    <!-- Agent 状态条（视觉为原尺寸四分之一） -->
    <div class="agent-strip-scale-wrap">
        <div class="agent-strip" id="agent-strip-pipeline">
            <div class="agent-badge ops" id="badge-ops">
                <div class="agent-badge-icon">⚡</div>
                <span>Ops-Agent</span>
            </div>
            <div class="connector-line"></div>
            <div class="agent-badge sre" id="badge-sre">
                <div class="agent-badge-icon">🔍</div>
                <span>SRE-Agent</span>
            </div>
            <div class="connector-line"></div>
            <div class="agent-badge code" id="badge-code">
                <div class="agent-badge-icon">💻</div>
                <span>Code-Agent</span>
            </div>
            <div class="connector-line"></div>
            <div class="agent-badge report" id="badge-report">
                <div class="agent-badge-icon">📊</div>
                <span>Report-Agent</span>
            </div>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <div class="messages-container" id="messages-container">
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">🤖</div>
                <p>输入故障信息<br>多个智能体将协作完成分析与处置</p>
            </div>
        </div>

        <!-- 输入区 -->
        <div class="input-area">
            <div class="input-card" id="input-card">
                <div class="input-card-header">
                    <div class="input-card-header-main">
                        <span class="input-card-title">故障录入</span>
                        <span class="input-card-hint">填写后启动编排</span>
                    </div>
                    <button type="button" class="input-card-toggle" id="input-panel-toggle" aria-expanded="true" aria-controls="input-card-body" title="折叠表单">
                        <svg class="input-card-toggle-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                </div>

                <div class="input-card-body" id="input-card-body">
                    <details class="input-details-compact">
                        <summary class="input-details-summary">可选：故障 ID / Trace ID（默认自动生成）</summary>
                        <div class="input-grid input-grid-2">
                            <div class="field-wrap">
                                <label class="field-label" for="incident_id">故障 ID</label>
                                <input type="text" class="input-field" id="incident_id" placeholder="留空则自动生成">
                            </div>
                            <div class="field-wrap">
                                <label class="field-label" for="trace_id">Trace ID</label>
                                <input type="text" class="input-field" id="trace_id" placeholder="留空则自动生成">
                            </div>
                        </div>
                    </details>

                    <div class="input-grid input-grid-3">
                        <div class="field-wrap">
                            <label class="field-label" for="device_id">设备 ID</label>
                            <input type="text" class="input-field" id="device_id" placeholder="例如 db-master-01" value="db-master-01">
                        </div>
                        <div class="field-wrap">
                            <label class="field-label" for="metric_type">指标类型</label>
                            <input type="text" class="input-field" id="metric_type" placeholder="例如 db.connection.timeout" value="db.connection.timeout">
                        </div>
                        <div class="field-wrap">
                            <label class="field-label" for="value">告警值</label>
                            <input type="text" class="input-field" id="value" placeholder="数值或文本" value="5000">
                        </div>
                    </div>

                    <div class="field-wrap field-wrap-summary">
                        <label class="field-label" for="summary">故障摘要</label>
                        <textarea class="input-field" id="summary" placeholder="故障现象简述…" rows="2">数据库连接超时，订单服务不可用</textarea>
                    </div>
                </div>

                <div class="input-footer">
                    <div class="footer-quick">
                        <span class="quick-inputs-label">快捷填充</span>
                        <div class="quick-inputs">
                            <span class="quick-input" onclick="fillQuickInput('数据库连接超时')">数据库故障</span>
                            <span class="quick-input" onclick="fillQuickInput('CPU 使用率 100%，服务响应缓慢')">CPU 过载</span>
                            <span class="quick-input" onclick="fillQuickInput('网络延迟增加，部分请求超时')">网络异常</span>
                            <span class="quick-input" onclick="fillQuickInput('内存溢出，Pod 频繁重启')">内存泄漏</span>
                        </div>
                    </div>
                    <button class="btn-primary" id="run-btn" onclick="runPipeline()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                        <span id="run-btn-text">启动 Pipeline</span>
                    </button>
                    <button class="btn-stop" id="stop-btn" onclick="stopExecution()" style="display:none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h12v12H6z"/>
                        </svg>
                        停止
                    </button>
                    <button class="btn-primary" id="run-debate-btn" onclick="runDebate()" style="display:none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h1l3 3c.39.39.39 1.02 0 1.41l-3.88 3.88c-.39.39-1.02.39-1.41 0L2 16.41V15c0-.55.45-1 1-1h1V6H3c-.55 0-1 .45-1 1v12.5L6.59 15H5l5 5 5-5h-1.59L18.5 19.5V18h2c.55 0 1-.45 1-1V7c0-.55-.45-1-1-1z"/>
                        </svg>
                        启动辩论
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/incidents';
        let isRunning = false;
        let currentAgentMessage = null;
        let agentBuffer = {};
        let debateMode = false;
        let abortController = null;  // 用于停止执行
        let currentSessionId = '';   // 当前辩论会话ID

        const AGENT_CONFIG = {
            ops: { name: 'Ops-Agent', avatar: '⚡', avatarClass: 'ops' },
            sre: { name: 'SRE-Agent', avatar: '🔍', avatarClass: 'sre' },
            code: { name: 'Code-Agent', avatar: '💻', avatarClass: 'code' },
            report: { name: 'Report-Agent', avatar: '📊', avatarClass: 'report' }
        };

        const DEBATE_ROUND_META = {
            ops_initial: { label: 'Ops 独立分析', agent: 'ops' },
            sre_initial: { label: 'SRE 独立分析', agent: 'sre' },
            code_initial: { label: 'Code 可行性评估', agent: 'code' },
            ops_review: { label: 'Ops 审视', agent: 'ops' },
            sre_review: { label: 'SRE 审视', agent: 'sre' },
            code_review: { label: 'Code 审视', agent: 'code' },
            converge: { label: 'SRE 收敛判断', agent: 'sre' },
            dispute: { label: '人类介入', agent: 'report' },
            report: { label: 'Report 裁决', agent: 'report' },
        };

        const AGENT_LABELS = {
            'Ops-Agent-01': 'ops', 'SRE-Agent-01': 'sre',
            'Code-Agent-01': 'code', 'DynamicCode-Agent-01': 'code',
            'Report-Agent-01': 'report'
        };

        const BADGE_MAP = {
            ops: 'badge-ops', sre: 'badge-sre', code: 'badge-code', report: 'badge-report'
        };

        function fillQuickInput(text) {
            document.getElementById('summary').value = text;
        }

        function setBadgeState(agentKey, state) {
            const badge = document.getElementById(BADGE_MAP[agentKey]);
            if (!badge) return;
            badge.className = `agent-badge ${agentKey}`;
            badge.classList.add(state);
        }

        function resetAllBadges() {
            ['ops', 'sre', 'code', 'report'].forEach(k => {
                setBadgeState(k, 'waiting');
            });
        }

        function setPipelineStatus(state, text) {
            const el = document.getElementById('pipeline-status');
            const txt = document.getElementById('pipeline-status-text');
            el.className = 'pipeline-status';
            if (state) el.classList.add(state);
            if (text) txt.textContent = text;
        }

        function syncModeUI() {
            const toggle = document.getElementById('debate-mode-toggle');
            const labelPipeline = document.getElementById('mode-label-pipeline');
            const labelDebate = document.getElementById('mode-label-debate');
            const runBtn = document.getElementById('run-btn');
            const runDebateBtn = document.getElementById('run-debate-btn');
            const status = document.getElementById('pipeline-status');

            debateMode = toggle.checked;

            if (debateMode) {
                labelPipeline.className = 'mode-label-inactive';
                labelDebate.className = 'mode-label-active';
                runBtn.style.display = 'none';
                runDebateBtn.style.display = 'flex';
                status.className = 'pipeline-status debate-mode';
            } else {
                labelPipeline.className = 'mode-label-active';
                labelDebate.className = 'mode-label-inactive';
                runBtn.style.display = 'flex';
                runDebateBtn.style.display = 'none';
                status.className = 'pipeline-status pipeline-mode';
            }
        }

        function addSystemMessage(text) {
            const container = document.getElementById('messages-container');
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.style.display = 'none';

            const wrapper = document.createElement('div');
            wrapper.className = 'system-message';
            wrapper.innerHTML = `<span>${text}</span>`;
            container.appendChild(wrapper);
            scrollToBottom();
        }

        function startAgentMessage(agentKey, interaction = null) {
            const container = document.getElementById('messages-container');
            const config = AGENT_CONFIG[agentKey];

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';
            wrapper.id = `agent-msg-${agentKey}`;

            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            wrapper.innerHTML = `
                <div class="message-avatar ${config.avatarClass} active" title="${config.name}">
                    ${config.avatar}
                </div>
                <div class="message-content">
                    <div class="message-header">
                        <div class="message-sender">${config.name}</div>
                        ${interaction ? `<div class="interaction-indicator">${interaction}</div>` : ''}
                    </div>
                    <div class="message-bubble streaming" id="bubble-${agentKey}"></div>
                    <div class="message-time" id="time-${agentKey}">${time}</div>
                </div>
            `;

            container.appendChild(wrapper);
            currentAgentMessage = agentKey;
            agentBuffer[agentKey] = '';
            scrollToBottom();

            return wrapper;
        }

        function startDebateTurn(roundKey, agentKey, turnIndex) {
            const container = document.getElementById('messages-container');
            const config = AGENT_CONFIG[agentKey];
            const meta = DEBATE_ROUND_META[roundKey] || { label: roundKey, agent: agentKey };
            
            // 辩论模式：每轮用唯一 ID，确保多个对话框独立显示
            const msgId = `debate-${agentKey}-${turnIndex}`;

            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${agentKey}-turn`;
            wrapper.id = `agent-msg-${msgId}`;

            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            
            // 辩论模式：显示轮次标签和 agent 常量
            const roundBadge = debateMode ? `<span class="debate-round-badge">第${turnIndex + 1}轮 · ${meta.label}</span>` : '';

            wrapper.innerHTML = `
                <div class="message-avatar ${config.avatarClass} active" title="${config.name}">
                    ${config.avatar}
                </div>
                <div class="message-content">
                    <div class="message-header">
                        <div class="message-sender">${roundBadge}${config.name}</div>
                    </div>
                    <div class="message-bubble streaming" id="bubble-${msgId}"></div>
                    <div class="message-time" id="time-${msgId}">${time}</div>
                </div>
            `;

            container.appendChild(wrapper);
            currentAgentMessage = msgId;
            agentBuffer[msgId] = '';
            scrollToBottom();

            return wrapper;
        }

        function appendToAgentMessage(agentKey, delta, msgId) {
            const bubble = document.getElementById(`bubble-${msgId || agentKey}`);
            if (bubble) {
                const key = msgId || agentKey;
                agentBuffer[key] = (agentBuffer[key] || '') + delta;
                bubble.innerHTML = formatContent(agentBuffer[key]);
                bubble.classList.add('streaming');
                scrollToBottom();
            }
        }

        function finishAgentMessage(agentKey, msgId) {
            const key = msgId || agentKey;
            const bubble = document.getElementById(`bubble-${key}`);
            const avatar = document.querySelector(`#agent-msg-${key} .message-avatar`);
            if (bubble) bubble.classList.remove('streaming');
            if (avatar) avatar.classList.remove('active');
            currentAgentMessage = null;
        }

        function addUserMessage(content) {
            const container = document.getElementById('messages-container');
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.style.display = 'none';

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper user';

            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            wrapper.innerHTML = `
                <div class="message-avatar user" title="我">👤</div>
                <div class="message-content">
                    <div class="message-bubble">${formatContent(content)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            container.appendChild(wrapper);
            scrollToBottom();
        }

        function formatContent(content) {
            let formatted = escapeHtml(content);
            formatted = formatted.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
                `<pre><code class="language-${lang}">${code.trim()}</code></pre>`);
            formatted = formatted.replace(/`([^`]+)`/g, '<span class="inline-code">$1</span>');
            formatted = formatted.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            formatted = formatted.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            formatted = formatted.replace(/^- (.+)$/gm, '<li>$1</li>');
            formatted = formatted.replace(/^(\d+)\. (.+)$/gm, '<li><strong>$1.</strong> $2</li>');
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            container.scrollTop = container.scrollHeight;
        }

        function resetAllAgents() {
            ['ops', 'sre', 'code', 'report'].forEach(k => { agentBuffer[k] = ''; });
            const container = document.getElementById('messages-container');
            const emptyState = document.getElementById('empty-state');
            container.innerHTML = '';
            if (emptyState) container.appendChild(emptyState);
        }

        function getInteractionText(agentKey) {
            const map = {
                ops: '← 故障报告', sre: '← Ops 分析',
                code: '← SRE 方案', report: '← 脚本就绪'
            };
            return map[agentKey] || '';
        }

        function stopExecution() {
            if (!isRunning) return;

            addSystemMessage('🛑 正在停止执行...');

            // 停止 fetch 请求
            if (abortController) {
                abortController.abort();
            }

            // 如果是辩论模式，通知后端终止会话
            if (debateMode && currentSessionId) {
                fetch(`${API_BASE}/debate/control?session_id=${currentSessionId}&action=reject`, {
                    method: 'POST'
                }).catch(() => {});
            }

            // 更新 UI
            isRunning = false;
            const runBtn = document.getElementById('run-btn');
            const stopBtn = document.getElementById('stop-btn');
            const debateBtn = document.getElementById('run-debate-btn');

            if (runBtn) {
                runBtn.disabled = false;
                runBtn.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                    启动 Pipeline
                `;
            }
            if (debateBtn) {
                debateBtn.disabled = false;
                debateBtn.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h1l3 3c.39.39.39 1.02 0 1.41l-3.88 3.88c-.39.39-1.02.39-1.41 0L2 16.41V15c0-.55.45-1 1-1h1V6H3c-.55 0-1 .45-1 1v12.5L6.59 15H5l5 5 5-5h-1.59L18.5 19.5V18h2c.55 0 1-.45 1-1V7c0-.55-.45-1-1-1z"/>
                    </svg>
                    启动辩论
                `;
            }
            if (stopBtn) {
                stopBtn.style.display = 'none';
            }

            setPipelineStatus('', '已停止');
        }

        async function runPipeline() {
            if (isRunning) return;

            const btn = document.getElementById('run-btn');
            isRunning = true;
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div>处理中...';

            const request = {
                incident_id: document.getElementById('incident_id').value || undefined,
                trace_id: document.getElementById('trace_id').value || undefined,
                summary: document.getElementById('summary').value,
                device_id: document.getElementById('device_id').value,
                metric_type: document.getElementById('metric_type').value,
                value: document.getElementById('value').value
            };

            addSystemMessage(`📋 收到故障报告：${request.summary}`);
            addUserMessage(request.summary);

            setPipelineStatus('active', 'Pipeline 执行中...');
            resetAllAgents();
            resetAllBadges();

            // 显示停止按钮
            const stopBtn = document.getElementById('stop-btn');
            if (stopBtn) stopBtn.style.display = 'flex';

            try {
                abortController = new AbortController();
                const response = await fetch(`${API_BASE}/run/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || '请求失败');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let currentEventType = 'message';
                let pipelineIncidentId = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // 处理 SSE 事件格式: "event: type\ndata: {...}\n\n"
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            currentEventType = line.slice(7).trim();
                        } else if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (!dataStr) continue;
                            try {
                                const data = JSON.parse(dataStr);
                                // 调试：打印所有接收到的数据
                                if (currentEventType === 'start' || currentEventType === 'done') {
                                    console.log(`SSE ${currentEventType} event:`, JSON.stringify(data, null, 2));
                                }
                                // 保存 incident_id 以便后续使用（从 start 或 done 事件获取）
                                if (data.incident_id) {
                                    pipelineIncidentId = data.incident_id;
                                    console.log(`Got incident_id from ${currentEventType} event:`, pipelineIncidentId);
                                }
                                // 传递事件类型 (chunk/done/start)
                                handleStreamEvent({...data, _eventType: currentEventType});
                            } catch (e) { console.error('Parse error:', e); }
                        }
                    }
                }

                addSystemMessage('✅ Pipeline 执行完成');
                setPipelineStatus('done', 'Pipeline 执行完成');

                // 显示完成面板（包含可视化入口和导出按钮）
                console.log('Pipeline completed, using incidentId:', pipelineIncidentId);
                if (pipelineIncidentId && pipelineIncidentId !== 'undefined' && pipelineIncidentId !== 'null') {
                    showPipelineCompletionPanel(pipelineIncidentId);
                } else {
                    addSystemMessage('⚠️ 无法获取故障 ID，导出功能暂时不可用');
                }

            } catch (error) {
                if (error.name === 'AbortError') {
                    addSystemMessage('🛑 Pipeline 已停止');
                    setPipelineStatus('', '已停止');
                } else {
                    addSystemMessage(`❌ 执行失败: ${error.message}`);
                    setPipelineStatus('', '执行失败');
                }
            } finally {
                isRunning = false;
                abortController = null;
                btn.disabled = false;
                btn.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                    启动 Pipeline
                `;
                if (stopBtn) stopBtn.style.display = 'none';
            }
        }

        // ── Pipeline 完成面板（可视化 + 导出）────────────────────
        function showPipelineCompletionPanel(incidentId) {
            // 确保 incidentId 有效（过滤掉 undefined/null/空字符串）
            if (!incidentId || incidentId === 'undefined' || incidentId === 'null' || incidentId === '') {
                console.error('Invalid incidentId for export:', incidentId);
                addSystemMessage('⚠️ 故障 ID 无效，无法导出报告。请重新执行一次 Pipeline。');
                return;
            }
            
            console.log('Pipeline completion panel - incidentId:', incidentId);
            const container = document.getElementById('messages-container');
            
            // 创建居中包装器
            const wrapper = document.createElement('div');
            wrapper.className = 'completion-panel-wrapper';
            wrapper.style.textAlign = 'center';
            
            const panel = document.createElement('div');
            panel.className = 'completion-panel';
            panel.innerHTML = `
                <div class="completion-panel-header">
                    <span class="completion-panel-title">📊 Pipeline 执行完成</span>
                </div>
                <div class="completion-panel-body">
                    <button class="completion-btn" onclick="openVisualization()">
                        <span class="completion-btn-icon">🖥️</span>
                        <span class="completion-btn-text">可视化分析</span>
                    </button>
                    <div class="completion-btn-divider"></div>
                    <button class="completion-btn completion-btn-small" onclick="exportPipelineReport('${incidentId}', 'docx', this)">
                        <span class="completion-btn-icon">📝</span>
                        <span class="completion-btn-text">Word</span>
                    </button>
                    <button class="completion-btn completion-btn-small" onclick="exportPipelineReport('${incidentId}', 'pdf', this)">
                        <span class="completion-btn-icon">📄</span>
                        <span class="completion-btn-text">PDF</span>
                    </button>
                </div>
            `;
            
            wrapper.appendChild(panel);
            container.appendChild(wrapper);
            scrollToBottom();
        }

        function openVisualization() {
            window.open('/visualization', '_blank', 'width=1200,height=800');
        }

        async function exportPipelineReport(incidentId, format, btn) {
            const originalText = btn.querySelector('.completion-btn-text').textContent;
            btn.querySelector('.completion-btn-text').textContent = '导出中...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/run/export?incident_id=${encodeURIComponent(incidentId)}&format=${encodeURIComponent(format)}`, {
                    method: 'POST'
                });

                if (response.ok) {
                    const contentDisposition = response.headers.get('Content-Disposition');
                    let filename = `report_${incidentId}.${format}`;
                    if (contentDisposition) {
                        const match = contentDisposition.match(/filename\*?=['"]?([^;\n"']+)/);
                        if (match) filename = match[1];
                    }

                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();

                    addSystemMessage(`✅ 报告已成功导出为 ${format.toUpperCase()} 格式`);
                } else {
                    // 读取详细错误信息
                    let errorMsg = '未知错误';
                    try {
                        const errorData = await response.json();
                        console.error('Export error response:', errorData);
                        errorMsg = errorData.detail || errorData.message || JSON.stringify(errorData);
                    } catch (e) {
                        errorMsg = `HTTP ${response.status}`;
                    }
                    addSystemMessage(`❌ 导出失败 (${response.status}): ${errorMsg}`);
                }
            } catch (e) {
                addSystemMessage(`❌ 导出失败: ${e.message}`);
            } finally {
                btn.querySelector('.completion-btn-text').textContent = originalText;
                btn.disabled = false;
            }
        }

        function handleStreamEvent(data) {
            if (data.delta !== undefined) {
                const agentKey = AGENT_LABELS[data.agent_id];
                if (!agentKey) return;

                if (debateMode) {
                    // 辩论模式：每个轮次独立对话框
                    const turnIndex = data.turn_index || 0;
                    const msgId = `debate-${agentKey}-${turnIndex}`;
                    
                    if (!document.getElementById(`bubble-${msgId}`)) {
                        setBadgeState(agentKey, 'active');
                        startDebateTurn(data.round || data.agent_id, agentKey, turnIndex);
                        agentBuffer[msgId] = '';
                    }
                    appendToAgentMessage(agentKey, data.delta, msgId);
                } else {
                    // Pipeline 模式：每个 Agent 一个对话框
                    if (!document.getElementById(`bubble-${agentKey}`)) {
                        setBadgeState(agentKey, 'active');
                        startAgentMessage(agentKey, getInteractionText(agentKey));
                    }
                    appendToAgentMessage(agentKey, data.delta, null);
                }
            }

            if (data.done) {
                const agentKey = AGENT_LABELS[data.agent_id];
                if (agentKey) {
                    setBadgeState(agentKey, 'done');
                    finishAgentMessage(agentKey, debateMode ? `debate-${agentKey}-${(data.turn_index || 0)}` : null);
                }
            }
        }

        async function runDebate() {
            if (isRunning) return;

            const btn = document.getElementById('run-debate-btn');
            isRunning = true;
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div>辩论中...';

            const request = {
                incident_id: document.getElementById('incident_id').value || undefined,
                trace_id: document.getElementById('trace_id').value || undefined,
                summary: document.getElementById('summary').value,
                device_id: document.getElementById('device_id').value,
                metric_type: document.getElementById('metric_type').value,
                value: document.getElementById('value').value
            };

            addSystemMessage(`🤖 开启动态辩论：Agent 根据推理结果决定辩论轮次`);
            addUserMessage(request.summary);

            setPipelineStatus('debate-mode', '辩论进行中...');
            resetAllAgents();
            resetAllBadges();
            currentSessionId = '';

            // 显示停止按钮
            const stopBtn = document.getElementById('stop-btn');
            if (stopBtn) stopBtn.style.display = 'flex';

            try {
                abortController = new AbortController();
                const response = await fetch(`${API_BASE}/debate/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || '辩论请求失败');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (!dataStr) continue;
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.type === 'session_id') {
                                    currentSessionId = data.session_id || '';
                                    // 通知 approveDebate 使用这个 session
                                    if (window._approveDebateSession) {
                                        window._approveDebateSession(currentSessionId);
                                    }
                                }
                                handleDebateEvent(data);
                            } catch (e) { console.error('Parse error:', e); }
                        }
                    }
                }

                addSystemMessage('✅ 辩论结束');
                setPipelineStatus('done', '辩论完成');

            } catch (error) {
                if (error.name === 'AbortError') {
                    addSystemMessage('🛑 辩论已停止');
                    setPipelineStatus('', '已停止');
                } else {
                    addSystemMessage(`❌ 辩论失败: ${error.message}`);
                    setPipelineStatus('', '辩论失败');
                }
            } finally {
                isRunning = false;
                abortController = null;
                btn.disabled = false;
                btn.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h1l3 3c.39.39.39 1.02 0 1.41l-3.88 3.88c-.39.39-1.02.39-1.41 0L2 16.41V15c0-.55.45-1 1-1h1V6H3c-.55 0-1 .45-1 1v12.5L6.59 15H5l5 5 5-5h-1.59L18.5 19.5V18h2c.55 0 1-.45 1-1V7c0-.55-.45-1-1-1z"/>
                    </svg>
                    启动辩论
                `;
                if (stopBtn) stopBtn.style.display = 'none';
                
                // 隐藏当前发言指示器
                const indicator = document.getElementById('debate-turn-indicator');
                if (indicator) indicator.classList.remove('visible');
            }
        }

        function handleDebateEvent(data) {
            // delta：每个 token 实时追加到气泡（辩论模式使用 turn_index 确保唯一性）
            if (data.type === 'delta') {
                const agentKey = AGENT_LABELS[data.agent_id] || 'ops';
                
                // 辩论模式需要 turn_index 来定位正确的对话框
                let msgId;
                if (data.turn_index !== undefined) {
                    msgId = `debate-${agentKey}-${data.turn_index}`;
                } else {
                    // 兼容：查找当前活动的对话框
                    const activeBubble = document.querySelector('.message-bubble.streaming');
                    if (activeBubble) {
                        msgId = activeBubble.id.replace('bubble-', '');
                    } else {
                        return;
                    }
                }
                
                let bubble = document.getElementById(`bubble-${msgId}`);
                
                // 如果气泡不存在但有 turn_index，创建一个新的对话框
                if (!bubble && data.turn_index !== undefined) {
                    const round = data.round || 'unknown';
                    const agentKey = AGENT_LABELS[data.agent_id] || 'ops';
                    const turnIndex = data.turn_index;
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'message-wrapper';
                    wrapper.id = `agent-msg-${msgId}`;
                    
                    const config = AGENT_CONFIG[agentKey] || AGENT_CONFIG.ops;
                    const meta = DEBATE_ROUND_META[round] || { label: round, agent: agentKey };
                    const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                    const roundBadge = `<span class="debate-round-badge">第${turnIndex + 1}轮 · ${meta.label}</span>`;
                    
                    wrapper.innerHTML = `
