                        <div class="message-avatar ${config.avatarClass} active" title="${config.name}">
                            ${config.avatar}
                        </div>
                        <div class="message-content">
                            <div class="message-header">
                                <div class="message-sender">${roundBadge}${config.name}</div>
                            </div>
                            <div class="message-bubble streaming" id="bubble-${msgId}"></div>
                            <div class="message-time" id="time-${msgId}">${time}</div>
                        </div>
                    `;
                    
                    const container = document.getElementById('messages-container');
                    container.appendChild(wrapper);
                    agentBuffer[msgId] = '';
                    setBadgeState(agentKey, 'active');
                    
                    bubble = document.getElementById(`bubble-${msgId}`);
                    
                    // 显示当前发言指示器
                    const indicator = document.getElementById('debate-turn-indicator');
                    const indicatorEmoji = document.getElementById('indicator-emoji');
                    const indicatorName = document.getElementById('indicator-name');
                    const indicatorLabel = document.getElementById('indicator-label');
                    if (indicator && indicatorEmoji && indicatorName && indicatorLabel) {
                        indicatorEmoji.textContent = config.avatar;
                        indicatorName.textContent = config.name;
                        indicatorLabel.textContent = `第${turnIndex + 1}轮发言中...`;
                        indicator.classList.add('visible');
                    }
                }
                
                if (bubble) {
                    agentBuffer[msgId] = (agentBuffer[msgId] || '') + data.delta;
                    bubble.innerHTML = formatContent(agentBuffer[msgId]);
                    bubble.classList.add('streaming');
                    scrollToBottom();
                }
                return;
            }

            if (data.type === 'turn_start') {
                const meta = DEBATE_ROUND_META[data.round] || { label: data.round, agent: 'ops' };
                const agentKey = AGENT_LABELS[data.agent_id] || meta.agent;
                const turnIndex = data.turn_index || 0;
                const msgId = `debate-${agentKey}-${turnIndex}`;

                if (!document.getElementById(`bubble-${msgId}`)) {
                    setBadgeState(agentKey, 'active');
                    startDebateTurn(data.round, agentKey, turnIndex);
                    agentBuffer[msgId] = '';
                }
                addSystemMessage(`📌 第 ${data.turn_id + 1} 轮 [${meta.label}]：${data.agent_id} 发言`);
                
                // 显示右下角当前发言指示器
                const indicator = document.getElementById('debate-turn-indicator');
                const indicatorEmoji = document.getElementById('indicator-emoji');
                const indicatorName = document.getElementById('indicator-name');
                const indicatorLabel = document.getElementById('indicator-label');
                if (indicator && indicatorEmoji && indicatorName && indicatorLabel) {
                    const config = AGENT_CONFIG[agentKey];
                    indicatorEmoji.textContent = config.avatar;
                    indicatorName.textContent = config.name;
                    indicatorLabel.textContent = `第${data.turn_id + 1}轮发言中...`;
                    indicator.classList.add('visible');
                }
            }

            if (data.type === 'convergence_check') {
                const pct = (data.score * 100).toFixed(0);
                addSystemMessage(
                    data.converged
                        ? `🤝 收敛检测通过（${pct}%），即将进入 Report 裁决`
                        : `⚠️ 收敛度 ${pct}%，存在未解决争议`
                );
            }

            // 人类介入暂停请求
            if (data.type === 'pause_request') {
                showHumanConfirmModal(data);
                return;
            }

            if (data.type === 'human_confirmed') {
                closeHumanConfirmModal();
                addSystemMessage(
                    data.approved
                        ? `✅ 人工已批准，辩论继续`
                        : `❌ 人工已拒绝，辩论终止`
                );
            }

            if (data.type === 'turn_done') {
                const agentKey = AGENT_LABELS[data.agent_id] || data.role;
                const turnIndex = data.turn_index || 0;
                const msgId = `debate-${agentKey}-${turnIndex}`;
                const bubble = document.getElementById(`bubble-${msgId}`);

                if (bubble) {
                    bubble.classList.remove('streaming');
                }

                setBadgeState(agentKey, 'done');
                finishAgentMessage(agentKey, msgId);

                if (data.error) {
                    addSystemMessage(`⚠️ ${data.agent_id} 执行异常: ${data.error}`);
                }

                // 显示下一轮指令（对用户透明，展示辩论走向）
                if (data.next_turn) {
                    const nextLabel = {
                        ops: 'Ops', sre: 'SRE', code: 'Code',
                        converge: '收敛判断', report: 'Report裁决',
                        dispute: '人类介入', terminate: '辩论终止'
                    }[data.next_turn] || data.next_turn;
                    addSystemMessage(`→ ${data.agent_id} 建议下一轮：${nextLabel}`);
                }

                // 收敛分
                if (data.convergence_score !== undefined) {
                    addSystemMessage(
                        `📐 当前收敛度：${(data.convergence_score * 100).toFixed(0)}%`
                    );
                }
                
                // 隐藏当前发言指示器
                const indicator = document.getElementById('debate-turn-indicator');
                if (indicator) indicator.classList.remove('visible');
            }

            if (data.type === 'debate_done') {
                const result = data.result || {};
                addSystemMessage(
                    `📊 辩论完成：${result.total_turns || 0} 轮 / ` +
                    `收敛度 ${((result.convergence_score || 0) * 100).toFixed(0)}% / ` +
                    `终止原因: ${result.termination_reason || '正常结束'}`
                );
                if (result.disputed_points && result.disputed_points.length > 0) {
                    addSystemMessage(`⚠️ 争议点：${result.disputed_points.join('；')}`);
                }
                
                // 隐藏当前发言指示器
                const indicator = document.getElementById('debate-turn-indicator');
                if (indicator) indicator.classList.remove('visible');
                
                // 显示导出按钮
                showDebateExportButtons(result.incident_id);
            }
        }

        // ── 辩论报告导出 ────────────────────────────────────
        function showDebateExportButtons(incidentId) {
            const container = document.getElementById('messages-container');
            
            // 创建居中包装器
            const wrapper = document.createElement('div');
            wrapper.className = 'debate-export-wrapper';
            wrapper.style.textAlign = 'center';
            
            const exportDiv = document.createElement('div');
            exportDiv.className = 'debate-export-panel';
            exportDiv.id = 'debate-export-panel';
            exportDiv.innerHTML = `
                <div class="export-panel-content">
                    <div class="export-title">📄 辩论报告导出</div>
                    <div class="export-description">辩论已完成，选择导出格式</div>
                    <div class="export-buttons">
                        <button class="export-btn export-docx" onclick="exportDebateReport('${incidentId}', 'docx')">
                            <span class="export-btn-icon">📝</span>
                            <span class="export-btn-text">导出 Word</span>
                        </button>
                        <button class="export-btn export-pdf" onclick="exportDebateReport('${incidentId}', 'pdf')">
                            <span class="export-btn-icon">📄</span>
                            <span class="export-btn-text">导出 PDF</span>
                        </button>
                    </div>
                </div>
            `;
            
            wrapper.appendChild(exportDiv);
            container.appendChild(wrapper);
            scrollToBottom();
        }

        async function exportDebateReport(incidentId, format) {
            const btn = event.target.closest('.export-btn');
            const originalText = btn.querySelector('.export-btn-text').textContent;
            btn.querySelector('.export-btn-text').textContent = '导出中...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/debate/export?incident_id=${encodeURIComponent(incidentId)}&format=${encodeURIComponent(format)}`, {
                    method: 'POST'
                });

                if (response.ok) {
                    // 获取文件名
                    const contentDisposition = response.headers.get('Content-Disposition');
                    let filename = `report_${incidentId}.${format}`;
                    if (contentDisposition) {
                        const match = contentDisposition.match(/filename\*?=['"]?([^;\n"']+)/);
                        if (match) filename = match[1];
                    }

                    // 下载文件
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();

                    addSystemMessage(`✅ 报告已成功导出为 ${format.toUpperCase()} 格式`);
                } else {
                    let errorMsg = '未知错误';
                    try {
                        const errorData = await response.json();
                        console.error('Debate export error response:', errorData);
                        errorMsg = errorData.detail || errorData.message || JSON.stringify(errorData);
                    } catch (e) {
                        errorMsg = `HTTP ${response.status}`;
                    }
                    addSystemMessage(`❌ 导出失败 (${response.status}): ${errorMsg}`);
                }
            } catch (e) {
                addSystemMessage(`❌ 导出失败: ${e.message}`);
            } finally {
                btn.querySelector('.export-btn-text').textContent = originalText;
                btn.disabled = false;
            }
        }

        // ── 人类介入确认弹窗 ────────────────────────────────────
        let _pendingPauseData = null;

        function showHumanConfirmModal(data) {
            _pendingPauseData = data;
            const modal = document.getElementById('human-confirm-modal');
            const content = document.getElementById('human-confirm-content');
            if (!modal || !content) return;

            const points = (data.disputed_points || []).map(p => `<li>${p}</li>`).join('');
            content.innerHTML = `
                <h3>⚠️ 需要人工确认</h3>
                <p>辩论存在未解决争议，请确认处置方向：</p>
                <ul>${points || '<li>无明确争议点</li>'}</ul>
                <p style="font-size:12px;color:#888;margin-top:12px;">
                    收敛分：${((data.score || 0) * 100).toFixed(0)}%｜原因：${data.reason || ''}
                </p>
            `;
            modal.style.display = 'flex';
        }

        function closeHumanConfirmModal() {
            const modal = document.getElementById('human-confirm-modal');
            if (modal) modal.style.display = 'none';
            _pendingPauseData = null;
        }

        // session_id 由 SSE 事件流首帧写入，全局可用
        window._debateSessionId = '';

        window._approveDebateSession = function(id) {
            window._debateSessionId = id;
        };

        async function approveDebate(action) {
            const sessionId = window._debateSessionId || '';
            if (!sessionId) {
                addSystemMessage(`❌ 辩论会话未就绪，session_id 缺失`);
                return;
            }
            try {
                const resp = await fetch(`${API_BASE}/debate/control?session_id=${encodeURIComponent(sessionId)}&action=${action}`, {
                    method: 'POST',
                });
                const result = await resp.json();
                closeHumanConfirmModal();
                addSystemMessage(result.message || `操作完成: ${result.status}`);
            } catch (e) {
                addSystemMessage(`❌ 控制请求失败: ${e.message}`);
            }
        }

        function initInputPanelToggle() {
            const card = document.getElementById('input-card');
            const btn = document.getElementById('input-panel-toggle');
            if (!card || !btn) return;

            function syncAria() {
                const collapsed = card.classList.contains('input-card--collapsed');
                btn.setAttribute('aria-expanded', String(!collapsed));
                btn.title = collapsed ? '展开表单' : '折叠表单';
            }

            btn.addEventListener('click', () => {
                card.classList.toggle('input-card--collapsed');
                syncAria();
            });

            syncAria();
        }

        function initModeToggle() {
            const toggle = document.getElementById('debate-mode-toggle');
            if (!toggle) return;
            toggle.addEventListener('change', syncModeUI);
            syncModeUI();
        }

        // 初始化
        initInputPanelToggle();
        initModeToggle();
        resetAllBadges();
        setPipelineStatus('pipeline-mode', '等待故障输入');
    </script>

    <!-- 人类介入确认弹窗 -->
    <div id="human-confirm-modal" style="
        display:none;position:fixed;top:0;left:0;right:0;bottom:0;
        background:rgba(0,0,0,0.7);z-index:9999;
        align-items:center;justify-content:center;
    ">
        <div style="
            background:#1e1e2e;border:1px solid rgba(196,181,253,0.3);
            border-radius:12px;padding:32px;max-width:480px;width:90%;
            box-shadow:0 8px 32px rgba(0,0,0,0.5);
        ">
            <div id="human-confirm-content" style="color:#e0e0e0;margin-bottom:24px;"></div>
            <div style="display:flex;gap:12px;justify-content:flex-end;">
                <button onclick="approveDebate('reject')" style="
                    padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;
                    background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.5);
                    color:#f87171;transition:all 0.2s;
                ">拒绝继续</button>
                <button onclick="approveDebate('approve')" style="
                    padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;
                    background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.5);
                    color:#34d399;transition:all 0.2s;
                ">批准继续</button>
            </div>
        </div>
    </div>
</body>
</html>
